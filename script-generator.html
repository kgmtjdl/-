<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>카드뉴스 대본 제작기</title>
<style>
  @font-face {
    font-family: 'Pretendard';
    src: url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/woff2/PretendardVariable.woff2') format('woff2-variations');
    font-weight: 45 920;
  }
  @import url('https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600&display=swap');

  :root{
    --bg:#1c1417; --surface:#251b1f; --surface-2:#2e2226;
    --cream:#f6efe9; --cream-dim:#cbb9ae;
    --mauve:#b76e79; --mauve-soft:#d8a2a9;
    --gold:#c9a227; --line: rgba(246,239,233,0.14);
  }
  *{box-sizing:border-box;}
  body{
    margin:0; background:var(--bg); color:var(--cream);
    font-family:'Pretendard', sans-serif; min-height:100vh; padding-bottom:60px;
  }
  header{
    padding:18px 20px; border-bottom:1px solid var(--line);
    display:flex; align-items:center; justify-content:space-between;
    position:sticky; top:0; background:rgba(28,20,23,0.9); backdrop-filter:blur(6px); z-index:10;
  }
  header a{ color:var(--cream-dim); text-decoration:none; font-size:13px; }
  header h1{ font-family:'Fraunces', serif; font-weight:500; font-size:16px; }

  .wrap{ max-width:640px; margin:0 auto; padding:24px 18px 0; }

  .intro{ font-size:13px; color:var(--cream-dim); line-height:1.7; margin-bottom:22px; }

  .group{
    background:var(--surface); border:1px solid var(--line); border-radius:14px;
    padding:18px; margin-bottom:16px;
  }
  .group h3{
    font-size:12px; text-transform:uppercase; letter-spacing:0.08em; color:var(--cream-dim);
    margin:0 0 12px; font-weight:600;
  }
  .row{ margin-bottom:12px; }
  .row:last-child{ margin-bottom:0; }
  .row label{ display:block; font-size:13px; color:var(--cream-dim); margin-bottom:6px; }
  .row input[type=text]{
    width:100%; background:var(--surface-2); border:1px solid var(--line); border-radius:8px;
    color:var(--cream); padding:10px 12px; font-family:inherit; font-size:14px;
  }

  .preset-btn{
    width:100%; padding:10px; border-radius:9px; border:1px dashed var(--line);
    background:none; color:var(--mauve-soft); font-size:13px; cursor:pointer; margin-bottom:16px;
  }
  .preset-btn:hover{ border-color:var(--mauve); }

  /* card list */
  #cards{ display:flex; flex-direction:column; gap:14px; margin-bottom:14px; }
  .card-item{
    background:var(--surface); border:1px solid var(--line); border-radius:14px; padding:16px;
    position:relative;
  }
  .card-item .num{
    position:absolute; top:16px; right:16px; font-family:'Fraunces', serif; font-size:13px; color:var(--cream-dim);
  }
  .card-item .field-row{ display:flex; gap:8px; margin-bottom:10px; }
  .card-item select, .card-item input[type=text]{
    background:var(--surface-2); border:1px solid var(--line); border-radius:8px;
    color:var(--cream); padding:9px 10px; font-family:inherit; font-size:13px;
  }
  .card-item select{ flex:none; width:130px; }
  .card-item .kw-input{ flex:1; }

  .gen-btn{
    width:100%; padding:9px; border-radius:8px; border:none;
    background:var(--surface-2); color:var(--cream); font-size:13px; cursor:pointer;
    border:1px solid var(--line);
  }
  .gen-btn:hover{ border-color:var(--gold); color:var(--gold); }

  .result{
    margin-top:12px; background:var(--surface-2); border-radius:10px; padding:12px 14px;
    display:none;
  }
  .result.show{ display:block; }
  .result textarea{
    width:100%; background:none; border:none; color:var(--cream); font-family:inherit;
    font-size:14px; line-height:1.6; resize:vertical; min-height:70px; padding:0;
  }
  .result-actions{ display:flex; justify-content:space-between; align-items:center; margin-top:8px; }
  .mini-link{ background:none; border:none; color:var(--cream-dim); font-size:12px; cursor:pointer; padding:0; }
  .mini-link:hover{ color:var(--gold); }
  .copy-ok{ color:var(--gold); }

  .del-card{
    position:absolute; bottom:14px; right:16px; background:none; border:none;
    color:var(--cream-dim); font-size:12px; cursor:pointer;
  }
  .del-card:hover{ color:var(--mauve-soft); }

  .add-card{
    width:100%; padding:12px; border-radius:12px; border:1px dashed var(--line);
    background:none; color:var(--cream-dim); font-size:14px; cursor:pointer; margin-bottom:22px;
  }
  .add-card:hover{ border-color:var(--mauve); color:var(--mauve-soft); }

  .footer-actions{
    display:flex; flex-direction:column; gap:10px; margin-bottom:20px;
  }
  .btn-primary{
    padding:14px; border-radius:11px; border:none; background:var(--gold); color:#1c1417;
    font-weight:700; font-size:14px; cursor:pointer;
  }
  .btn-primary:hover{ filter:brightness(1.06); }
  .btn-secondary{
    padding:12px; border-radius:11px; border:1px solid var(--line); background:var(--surface);
    color:var(--cream-dim); font-size:13px; cursor:pointer; text-align:center; text-decoration:none;
  }
  .btn-secondary:hover{ color:var(--cream); border-color:var(--mauve); }

  .all-preview{
    background:var(--surface); border:1px solid var(--line); border-radius:14px; padding:16px;
    font-size:13px; color:var(--cream-dim); line-height:1.8; white-space:pre-wrap; margin-bottom:16px; display:none;
  }
  .all-preview.show{ display:block; }
</style>
</head>
<body>

<header>
  <h1>🗞️ 카드뉴스 대본 제작기</h1>
  <a href="index.html">← 홈으로</a>
</header>

<div class="wrap">
  <p class="intro">가게 정보를 입력하고, 카드뉴스에 넣고 싶은 순서(목차)대로 카드를 구성하세요.<br>카드마다 "문구 생성"을 누르면 초안이 나와요 — 자유롭게 수정하셔도 됩니다.</p>

  <div class="group">
    <h3>가게 정보</h3>
    <div class="row">
      <label>가게 이름</label>
      <input type="text" id="shop-name" placeholder="가게 이름을 입력하세요" value="">
    </div>
    <div class="row">
      <label>예약/문의 방법</label>
      <input type="text" id="shop-cta" placeholder="예: 프로필 링크로 예약, 카톡 문의 등" value="프로필 링크에서 예약하세요">
    </div>
  </div>

  <button class="preset-btn" id="load-preset">✨ 기본 목차 불러오기 (후킹 → 공감 → 정보 → 강점 → 예약유도)</button>

  <div id="cards"></div>
  <button class="add-card" id="add-card">+ 카드 추가</button>

  <div class="footer-actions">
    <button class="btn-primary" id="gen-all">전체 카드 한번에 문구 생성</button>
    <div class="all-preview" id="all-preview"></div>
    <button class="btn-secondary" id="copy-all">전체 대본 복사하기</button>
    <a class="btn-secondary" href="card-editor.html">카드뉴스 편집기로 이동 →</a>
  </div>
</div>

<script>
const TYPES = {
  hook:   '후킹 (시선끌기)',
  empathy:'공감/문제제기',
  info:   '정보/꿀팁',
  strength:'우리가게 강점',
  review: '고객 후기',
  cta:    '예약 유도',
  outro:  '마무리 인사'
};

const TEMPLATES = {
  hook: [
    (kw,shop)=>({title:`"${kw}" 아직도 이렇게 하고 계세요?`, body:`${kw}, 제대로 알고 계신가요?\n오늘 알려드릴게요.`}),
    (kw,shop)=>({title:`${kw} 고민, 3분만 투자하세요`, body:`요즘 ${kw} 때문에 고민 많으시죠?\n오늘 카드 5장으로 끝내드릴게요.`}),
    (kw,shop)=>({title:`${kw} 이거 모르면 손해예요`, body:`많은 분들이 놓치는 ${kw} 꿀팁,\n지금 바로 알려드립니다.`}),
  ],
  empathy: [
    (kw,shop)=>({title:`이런 고민, 있으시죠?`, body:`"${kw}, 나한테 어울릴까?"\n"관리는 어떻게 해야 하지?"\n한 번쯤 고민해보셨을 거예요.`}),
    (kw,shop)=>({title:`${kw}, 다들 이렇게 힘들어해요`, body:`혼자 고민하지 마세요.\n${kw} 때문에 스트레스 받는 분들,\n생각보다 정말 많아요.`}),
  ],
  info: [
    (kw,shop)=>({title:`${kw} 이렇게 관리하세요`, body:`1. 첫 번째 포인트\n2. 두 번째 포인트\n3. 세 번째 포인트\n하나씩 차근차근 적용해보세요.`}),
    (kw,shop)=>({title:`${kw}, 알아두면 좋은 정보`, body:`전문가들이 실제로 사용하는\n${kw} 관리 팁을 정리했어요.\n오늘부터 따라해보세요.`}),
  ],
  strength: [
    (kw,shop)=>({title:`${shop}가 다른 이유`, body:`${kw} 전문 노하우로\n고객님 한 분 한 분께\n맞춤 시술을 제공합니다.`}),
    (kw,shop)=>({title:`${shop}에서만 가능한 것`, body:`${kw}에 대한 풍부한 경험과\n꼼꼼한 상담으로\n만족스러운 결과를 약속드려요.`}),
  ],
  review: [
    (kw,shop)=>({title:`실제 고객님 후기`, body:`"${kw} 덕분에 정말 만족했어요!\n다음에도 꼭 다시 올게요"\n— ${shop} 방문 고객님`}),
    (kw,shop)=>({title:`이렇게 말씀해주셨어요`, body:`"${kw} 고민이었는데\n${shop}에서 해결했어요"\n실제 후기 중 하나입니다.`}),
  ],
  cta: [
    (kw,shop)=>({title:`지금 바로 예약하세요`, body:`${kw} 상담, ${shop}에서 받아보세요.\n${document.getElementById('shop-cta') ? document.getElementById('shop-cta').value : ''}`}),
    (kw,shop)=>({title:`오늘, ${shop} 방문해보세요`, body:`${kw} 고민 끝내는 방법,\n지금 바로 예약하고 확인하세요.`}),
  ],
  outro: [
    (kw,shop)=>({title:`오늘 내용이 도움 되셨나요?`, body:`${shop}가 항상 ${kw} 고민을\n함께 해결해드릴게요.\n저장하고 다음에 또 확인하세요!`}),
    (kw,shop)=>({title:`끝까지 봐주셔서 감사해요`, body:`더 궁금한 점은 언제든 문의주세요.\n${shop}가 기다리고 있을게요.`}),
  ],
};

let cardCount = 0;
const cardsEl = document.getElementById('cards');

function addCard(type='hook', keyword=''){
  cardCount++;
  const id = 'card-' + cardCount;
  const div = document.createElement('div');
  div.className = 'card-item';
  div.id = id;
  div.innerHTML = `
    <span class="num">#${cardCount}</span>
    <div class="field-row">
      <select class="type-select">
        ${Object.entries(TYPES).map(([k,v]) => `<option value="${k}" ${k===type?'selected':''}>${v}</option>`).join('')}
      </select>
      <input type="text" class="kw-input" placeholder="핵심 키워드 (예: 여름 펌, 탈모 관리)" value="${keyword}">
    </div>
    <button class="gen-btn">✍️ 문구 생성</button>
    <div class="result">
      <textarea rows="4"></textarea>
      <div class="result-actions">
        <button class="mini-link regen-btn">🔁 다른 버전으로</button>
        <button class="mini-link copy-btn">복사</button>
      </div>
    </div>
    <button class="del-card">삭제</button>
  `;
  cardsEl.appendChild(div);

  const genBtn = div.querySelector('.gen-btn');
  const regenBtn = div.querySelector('.regen-btn');
  const copyBtn = div.querySelector('.copy-btn');
  const delBtn = div.querySelector('.del-card');
  const result = div.querySelector('.result');
  const textarea = div.querySelector('textarea');

  function generate(){
    const type = div.querySelector('.type-select').value;
    const kw = div.querySelector('.kw-input').value.trim() || '이 주제';
    const shop = document.getElementById('shop-name').value.trim() || '우리 가게';
    const pool = TEMPLATES[type];
    const pick = pool[Math.floor(Math.random()*pool.length)](kw, shop);
    textarea.value = `${pick.title}\n\n${pick.body}`;
    result.classList.add('show');
  }

  genBtn.addEventListener('click', generate);
  regenBtn.addEventListener('click', generate);
  copyBtn.addEventListener('click', () => {
    navigator.clipboard.writeText(textarea.value).then(() => {
      copyBtn.textContent = '복사됨!';
      copyBtn.classList.add('copy-ok');
      setTimeout(() => { copyBtn.textContent = '복사'; copyBtn.classList.remove('copy-ok'); }, 1500);
    });
  });
  delBtn.addEventListener('click', () => div.remove());
}

document.getElementById('add-card').addEventListener('click', () => addCard());

document.getElementById('load-preset').addEventListener('click', () => {
  cardsEl.innerHTML = '';
  cardCount = 0;
  addCard('hook');
  addCard('empathy');
  addCard('info');
  addCard('strength');
  addCard('cta');
});

document.getElementById('gen-all').addEventListener('click', () => {
  document.querySelectorAll('.gen-btn').forEach(btn => btn.click());
  buildPreview();
});

function buildPreview(){
  const items = [...cardsEl.querySelectorAll('.card-item')];
  const text = items.map((div, i) => {
    const ta = div.querySelector('textarea');
    return `— 카드 ${i+1} —\n${ta.value || '(아직 생성되지 않음)'}`;
  }).join('\n\n');
  const preview = document.getElementById('all-preview');
  preview.textContent = text;
  preview.classList.add('show');
}

document.getElementById('copy-all').addEventListener('click', () => {
  buildPreview();
  const text = document.getElementById('all-preview').textContent;
  navigator.clipboard.writeText(text).then(() => {
    const btn = document.getElementById('copy-all');
    const original = btn.textContent;
    btn.textContent = '전체 대본이 복사되었어요!';
    setTimeout(() => btn.textContent = original, 1800);
  });
});

// initial state
addCard('hook');
addCard('empathy');
addCard('info');
addCard('strength');
addCard('cta');
</script>
</body>
</html>
